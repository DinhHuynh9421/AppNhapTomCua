<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

 <meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nhập Đơn Hàng">
<meta name="theme-color" content="#1a56db">
 
<title>Nhập Đơn Hàng</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f4f6f8; color: #222; font-size: 15px; }
  h1 { text-align: center; padding: 18px 0 10px; font-size: 20px; color: #1a56db; letter-spacing: 0.5px; }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.09); padding: 18px 18px 14px; margin: 0 auto 14px; max-width: 600px; }
  label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }

  input[type="date"]::-webkit-calendar-picker-indicator {
  cursor: pointer;
  }
  input[type="date"] {
  -webkit-locale: "vi-VN";
}

  input[type=text], input[type=number] {
    width: 100%; padding: 9px 11px; border: 1px solid #d1d5db;
    border-radius: 7px; font-size: 14px; outline: none; background: #fff; color: #222;
  }
  input:focus { border-color: #1a56db; }
  input[readonly] { background: #f0f4ff; color: #555; cursor: default; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field { position: relative; }
  .dropdown {
    display: none; position: absolute; top: 100%; left: 0; right: 0;
    background: #fff; border: 1px solid #d1d5db; border-radius: 7px;
    z-index: 999; max-height: 200px; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .dropdown div {
    padding: 9px 12px; font-size: 13px; cursor: pointer;
    display: flex; justify-content: space-between;
  }
  .dropdown div:hover { background: #eff6ff; }
  .dropdown div span.addr { color: #888; font-size: 12px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 20px; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
  .btn-add { background: #1a56db; color: #fff; width: 100%; justify-content: center; margin-top: 4px; }
  .btn-add:hover { background: #1648c0; }
  .btn-print { background: #0f766e; color: #fff; }
  .btn-print:hover { background: #0d6561; }
  .btn-copy { background: #fff; color: #222; border: 1px solid #d1d5db; }
  .btn-copy:hover { background: #f3f4f6; }
  .btn-zalo { background: #0068FF; color: #fff; }
  .btn-zalo:hover { background: #0055d4; }
  .btn-clear { background: #fff; color: #e53e3e; border: 1px solid #fca5a5; font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 7px 8px; color: #666; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
  td { padding: 7px 8px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  td.del { text-align: center; color: #e53e3e; cursor: pointer; font-size: 18px; font-weight: bold; }
  td.del:hover { color: #c53030; }
  .print-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 13px 15px; font-size: 13px; line-height: 2; white-space: pre-wrap; word-break: break-word; margin-bottom: 14px; color: #222; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .toast { display: none; position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 9px 22px; border-radius: 8px; font-size: 13px; z-index: 9999; }
  .section-title { font-size: 12px; color: #888; margin-bottom: 10px; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
</style>
</head>
<body>

<h1>📋 Nhập Đơn Hàng</h1>

<div class="card">
  <p class="section-title">Thông tin đơn hàng mới</p>
  <div class="row2" style="margin-bottom:12px;">
  <div class="field">
    <label>Ngày đặt hàng</label>
    <input id="inp-date" type="date" style="width:100%;padding:9px 11px;border:1px solid #d1d5db;border-radius:7px;font-size:14px;outline:none;"
    lang="vi" />
  </div>
</div>
  <div class="row2"> 
    <div class="field">
      <label>Họ tên khách hàng</label>
      <input id="inp-name" type="text" placeholder="Gõ tên..." autocomplete="off"
        oninput="filterNames(this.value)" onfocus="filterNames(this.value)" />
      <div class="dropdown" id="dd-name"></div>
    </div>
    <div class="field">
      <label>Địa chỉ</label>
      <input id="inp-addr" type="text" placeholder="Tự điền theo tên" readonly />
    </div>
  </div>
  <div class="row2">
    <div class="field">
      <label>Số lượng</label>
      <input id="inp-qty" type="number" min="1" placeholder="Nhập số lượng..." />
    </div>
    <div class="field">
      <label>Sản phẩm mua</label>
      <input id="inp-prod" type="text" placeholder="Gõ tên sản phẩm..." autocomplete="off"
        oninput="filterProds(this.value)" onfocus="filterProds(this.value)" />
      <div class="dropdown" id="dd-prod"></div>
    </div>
  </div>
  <button class="btn btn-add" onclick="addRow()">+ Thêm vào danh sách</button>
</div>

<div class="card" id="list-area" style="display:none;">
  <div class="top-bar">
    <p class="section-title" style="margin:0;">Danh sách đơn hàng</p>
    <button class="btn-clear" onclick="clearAll()">Xóa tất cả</button>
  </div>
  <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th style="width:32%;">Họ tên</th>
          <th style="width:14%;">ĐC</th>
          <th style="width:12%;text-align:center;">SL</th>
          <th style="width:32%;">Sản phẩm</th>
          <th style="width:10%;"></th>
        </tr>
      </thead>
      <tbody id="order-body"></tbody>
    </table>
  </div>
  <div style="text-align:right; margin-top:14px;">
    <button class="btn btn-print" onclick="showPrint()">🖨 IN / XUẤT</button>
  </div>
</div>

<div class="card" id="print-area" style="display:none;">
  <p class="section-title">Nội dung xuất</p>
  <div class="print-box" id="print-text"></div>
  <div class="btn-row">
    <button class="btn btn-copy" onclick="copyText()">📋 Sao chép</button>
    <button class="btn btn-zalo" onclick="sendZalo()">💬 Gửi Zalo</button>
  </div>
</div>

<div class="toast" id="toast"></div>

const PRODUCTS = [
  "Sú lở", "Sú", "Sú moana", "Sú chân đỏ", "TCX", "Càng", "Cua tiêu", "Cua mít", "Cua", "YuccaC30",

  /* THÊM SẢN PHẨM VÀO ĐÂY — ví dụ: "Tên sản phẩm", */
];

let orders = [];
// Tự động chọn ngày hôm nay
document.getElementById('inp-date').valueAsDate = new Date();

function norm(s){
  return s.toLowerCase()
  .replace(/đ/g, 'd')
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g,"");
}

function filterNames(v){
  const dd = document.getElementById('dd-name');

  if(!v.trim()){
    dd.style.display='none';
    return;
  }

  const keyword = norm(v);

  const hits = CUSTOMERS
    .map(c => {
      const n = norm(c.name);

      // MỚI
const words = n.split(' ');
let score = 99;
if(words[words.length - 1] === keyword){
  score = 0;  // từ cuối khớp CHÍNH XÁC → cao nhất
}
else if(words[words.length - 1].startsWith(keyword)){
  score = 1;  // từ cuối bắt đầu bằng keyword
}
else if(words.some(w => w.startsWith(keyword))){
  score = 2;  // từ khác bắt đầu đúng
}
else if(n.includes(keyword)){
  score = 3;  // chứa ở giữa
}

      return {...c, score};
    })
    .filter(c => c.score < 99)
    .sort((a,b) => a.score - b.score)
    .slice(0,12);

  if(!hits.length){
    dd.style.display='none';
    return;
  }

  dd.innerHTML = hits.map(c =>
    `<div onclick="pickName('${esc(c.name)}','${esc(c.addr)}')">
      <span>${c.name}</span>
      <span class="addr">${c.addr}</span>
    </div>`
  ).join('');

  dd.style.display = 'block';
}
function pickName(name, addr){
  document.getElementById('inp-name').value = name;
  document.getElementById('inp-addr').value = addr;
  document.getElementById('dd-name').style.display = 'none';
}

function filterProds(v){
  const dd = document.getElementById('dd-prod');
  if(!v.trim()){ dd.style.display='none'; return; }
  const keyword = norm(v);
  
  const hits = PRODUCTS
    .map(p => {
      const n = norm(p);
      const words = n.split(' ');
      let score = 99;
      if(words[0] === keyword){
        score = 0;  // từ đầu khớp chính xác
      }
      else if(words[0].startsWith(keyword)){
        score = 1;  // từ đầu bắt đầu bằng keyword
      }
      else if(words.some(w => w === keyword)){
        score = 2;  // từ khác khớp chính xác
      }
      else if(n.includes(keyword)){
        score = 3;  // chứa ở giữa
      }
      return {p, score};
    })
    .filter(x => x.score < 99)
    .sort((a,b) => a.score - b.score)
    .slice(0,10)
    .map(x => x.p);

  if(!hits.length){ dd.style.display='none'; return; }
  dd.innerHTML = hits.map(p =>
    `<div onclick="pickProd('${esc(p)}')">${p}</div>`
  ).join('');
  dd.style.display = 'block';
}

function pickProd(p){
  document.getElementById('inp-prod').value = p;

}

});

function addRow(){
  const name = document.getElementById('inp-name').value.trim();
  const addr = document.getElementById('inp-addr').value.trim();
  const qty  = document.getElementById('inp-qty').value.trim();
  const prod = document.getElementById('inp-prod').value.trim();
  if(!name||!qty||!prod){ toast('Vui lòng điền đủ: Tên, Số lượng, Sản phẩm!'); return; }
  orders.push({name, addr, qty, prod});
  renderTable();
  document.getElementById('inp-name').value='';
  document.getElementById('inp-addr').value='';
  document.getElementById('inp-qty').value='';
  document.getElementById('inp-prod').value='';
  document.getElementById('inp-name').focus();
}

function renderTable(){
  const tbody = document.getElementById('order-body');
  tbody.innerHTML = orders.map((o,i) =>
    `<tr>
      <td>${o.name}</td>
      <td style="color:#888;">${o.addr}</td>
      <td style="text-align:center;">${o.qty}</td>
      <td>${o.prod}</td>
      <td class="del" onclick="delRow(${i})" title="Xóa">✕</td>
    </tr>`
  ).join('');
  document.getElementById('list-area').style.display = orders.length ? 'block' : 'none';
  document.getElementById('print-area').style.display = 'none';
}

function delRow(i){ orders.splice(i,1); renderTable(); }
function clearAll(){ if(confirm('Xóa tất cả đơn hàng?')){ orders=[]; renderTable(); } }

function showPrint(){
  const dateVal = document.getElementById('inp-date').value;
  const [y,m,d] = dateVal.split('-');
  const dateStr = dateVal ? `Ngày: ${d}/${m}/${y}\n` : '';
  const txt = dateStr + orders.map(o => `${o.name} - ${o.addr} - SL: ${o.qty} - ${o.prod}`).join('\n');
  document.getElementById('print-text').textContent = txt;
  document.getElementById('print-area').style.display = 'block';
  document.getElementById('print-area').scrollIntoView({behavior:'smooth'});
}

function copyText(){
  const txt = document.getElementById('print-text').textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>toast('Đã sao chép!')).catch(()=>fallbackCopy(txt));
  } else { fallbackCopy(txt); }
}

function fallbackCopy(txt){
  const ta = document.createElement('textarea');
  ta.value = txt; document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  toast('Đã sao chép!');
}

async function sendZalo(){
  const txt = document.getElementById('print-text').textContent;

  // Điện thoại hỗ trợ chia sẻ hệ thống
  if (navigator.share) {
    try {
      await navigator.share({
        title: 'Danh sách đơn hàng',
        text: txt
      });
    } catch (err) {
      console.log('Người dùng hủy chia sẻ');
    }
  } else {
    // Máy không hỗ trợ thì copy
    copyText();
    toast('Máy không hỗ trợ chia sẻ!');
  }
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display='block';
  setTimeout(()=>{ t.style.display='none'; }, 2500);
}

function esc(s){ return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
